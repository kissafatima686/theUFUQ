<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Al Ufuq Global Trading LLC FZE — Premium Timber & Wood Panels</title>
    <meta name="description" content="Dubai's trusted supplier of premium MDF, plywood, OSB and timber for construction, furniture and woodworking." />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500&family=Oswald:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" />
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        background-color: #181614;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        will-change: opacity, visibility;
      }
      #preloader.loaded {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .preloader-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 3.5rem;
        color: #d4a373;
        letter-spacing: 0.25em;
        animation: pulse 1.5s infinite alternate ease-in-out;
        text-align: center;
        padding-left: 0.25em; /* visual center balance */
        will-change: transform, opacity;
        backface-visibility: hidden;
      }
      .preloader-bar {
        width: 120px;
        height: 3px;
        background-color: rgba(212, 163, 115, 0.15);
        border-radius: 2px;
        margin-top: 15px;
        overflow: hidden;
        position: relative;
      }
      .preloader-progress {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 60px;
        background-color: #d4a373;
        animation: loading 1.4s infinite ease-in-out;
        will-change: transform;
        transform: translateX(-60px);
      }
      @keyframes pulse {
        from { opacity: 0.5; transform: scale(0.97) translateZ(0); }
        to { opacity: 1; transform: scale(1.02) translateZ(0); }
      }
      @keyframes loading {
        0% { transform: translateX(-60px); }
        100% { transform: translateX(120px); }
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="preloader-title">AL-UFUQ</div>
      <div class="preloader-bar">
        <div class="preloader-progress"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
